name: Naukri Daily Telegram Reminder

on:
  schedule:
    - cron: "30 3 * * *"  # 9:00 AM IST
  workflow_dispatch:

jobs:
  telegram-reminder:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout ytci repo
      # =========================
      - name: Checkout ytci (private repo)
        uses: actions/checkout@v4
        with:
          repository: prkpushp/ytci
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: ytci
          fetch-depth: 1

      # =========================
      # =========================
      - name: Load BOT_TOKEN from ytci repo
        run: |
          BOT_TOKEN=$(jq -r '.telegram.bot_token' ytci/naukri/naukri.json)

          if [ -z "$BOT_TOKEN" ] || [ "$BOT_TOKEN" == "null" ]; then
            echo "BOT_TOKEN not found in ytci repo JSON"
            exit 1
          fi

          echo "BOT_TOKEN=$BOT_TOKEN" >> $GITHUB_ENV
          
      # 2. Fetch Telegram updates + update users.json
          
      - name: Fetch Telegram updates + update users.json
        run: |
          set -e

          BOT_TOKEN="${{ secrets.BOT_TOKEN }}"

          mkdir -p ytci/naukri

          # Ensure file exists
          if [ ! -f ytci/naukri/users.json ]; then
            echo '{"users":[]}' > ytci/naukri/users.json
          fi

          # Fetch Telegram updates
          RESPONSE=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates")
          echo "$RESPONSE" > updates.json

          # SAFE extract chat IDs (FIXED FOR CI + Telegram variability)
          NEW_USERS=$(jq -r '
            (.result // [])
            | .[]
            | select(.message?.chat?.id != null)
            | .message.chat.id
          ' updates.json | sort -u)

          # SAFE existing users load
          EXISTING=$(jq -r '.users[]? // empty' ytci/naukri/users.json 2>/dev/null || true)

          # Merge + dedupe safely
          printf "%s\n%s\n" "$EXISTING" "$NEW_USERS" \
            | grep -v '^$' \
            | sort -u \
            | jq -R . \
            | jq -s '{users: .}' > ytci/naukri/users.json

      # =========================
      # 3. Commit updated users.json
      # =========================
      - name: Commit updated users.json
        run: |
          cd ytci

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add naukri/users.json

          git commit -m "Update Telegram users list" || echo "No changes"

          git push origin HEAD

      # =========================
      # 4. Send Telegram reminders
      # =========================
      - name: Send Telegram reminders
        run: |
          BOT_TOKEN="${{ secrets.BOT_TOKEN }}"

          NAUKRI_PROFILE_URL="https://www.naukri.com/mnjuser/profile"

          MESSAGE="📢 Naukri Profile Update Reminder
          
          👉 Open Profile: ${NAUKRI_PROFILE_URL}
          
          आज अपना Naukri profile refresh कर लो 👇
          • Login करो
          • Profile खोलो
          • SAVE दबा दो
          
          ⏰ Best time: 8–10 AM
          🔥 Recruiter visibility boost"
          
                    USERS=$(jq -r '.users[]' ytci/naukri/users.json)
          
                    for CHAT_ID in $USERS; do
                      echo "Sending to $CHAT_ID"
          
                      curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                        -d chat_id="$CHAT_ID" \
                        -d text="$MESSAGE" \
                        -d parse_mode="Markdown"
                    done
