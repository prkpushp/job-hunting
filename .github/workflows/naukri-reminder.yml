name: Naukri Daily Telegram Reminder

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  telegram-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (ytci repo)
        run: |
          git clone https://x-access-token:${{ secrets.CROSS_REPO_PAT }}@github.com/ytci/naukri.git ytci

      - name: Send Telegram reminders
        run: |
          BOT_TOKEN="${{ secrets.BOT_TOKEN }}"

          NAUKRI_PROFILE_URL="https://www.naukri.com/mnjuser/profile"

          MESSAGE="📢 *Naukri Profile Update Reminder*

          👉 *Open Profile*: ${NAUKRI_PROFILE_URL}

          आज अपना Naukri profile refresh कर लो 👇
          • Login करो
          • Profile खोलो
          • SAVE दबा दो
          
          ⏰ Best time: 8–10 AM
          🔥 Recruiter visibility boost"
          
                    USERS=$(jq -r '.users[]' ytci/users.json)
          
                    for CHAT_ID in $USERS; do
                      echo "Sending to $CHAT_ID"
          
                      curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                        -d chat_id="$CHAT_ID" \
                        -d text="$MESSAGE" \
                        -d parse_mode="Markdown"
                    done
